<div class="theme-switch">
    <div class="theme" data-theme="light-blue"><i class="icon icon-theme"></i> light-blue</div>
    <div class="theme selected" data-theme="dark-blue"><i class="icon icon-theme"></i> dark-blue</div>

<fieldset id="options">
    <legend>More styles</legend>
    
    <div class="Checkbox" data-class="vertical">Vertical</div>
    <div class="Checkbox" data-class="root-iconless">Root No Icon</div>
</fieldset>

<div >
    
</div>

<script>
    document.querySelector('.theme-switch').addEventListener('article-theme-change', function(e) {
        $('.Menu').removeClass(['menu-light-blue', 'menu-dark-blue']).addClass('menu-' + e.detail.name);
    });
    document.querySelectorAll('#options .Checkbox').forEach(element => new intell.ctrl.Checkbox(element));
    document.getElementById('options').addEventListener('checkboxchange', function(e) {
        const checkbox = e.checkbox;
        const className = checkbox.element.getAttribute('data-class');
        
        $('.Menu').toggleClass(className, checkbox.checked);
    });
    


</script>

<div class="example">
    <div class="title">Context Menu</div>
    <div id="menu3-container" data-source="context-menu" style="display:flex;flex-direction:column;align-items:flex-start;min-height:150px">
        <div id="menu3" class="Menu menu-dark-blue" style="display:none"></div>


        <script>
            const menu3 = new intell.ctrl.Menu(document.getElementById('menu3'));
            menu3.rootChildrenLocations = [4, 12];
            menu3.rootChildrenDirection = 'column';
            menu3.contextMenu = true;

            menu3.add({
                iconClass: 'icon-doc', text: 'File', children: [
                    {
                        text: 'New', children: [
                            { iconClass: 'icon-stylesheet', text: 'AA', title: 'Creates new AA format file' },
                            { iconClass: 'icon-html-file', text: 'BB', title: 'Creates new BB format file' }
                        ]
                    },
                    {
                        iconClass: 'icon-folder-open-empty', text: 'Open', children: [
                            { text: 'Folder' },
                            { text: 'File' }
                        ]
                    },
                    '--',
                    { text: 'Exit' }
                ]
            });
            menu3.add({
                iconClass: 'icon-pencil', text: 'Edit', children: [
                    {
                        text: 'Go To', children: [
                            { text: 'Go To Text...' },
                            { text: 'Go To All...' }
                        ]
                    }
                ]
            });
            menu3.add({
                iconClass: 'icon-arrows-ccw', text: 'Refresh'
            });

            const x = document.getElementById('menu3-container');
            x.addEventListener('contextmenu', function(e) { e.preventDefault() });
            x.addEventListener('mouseup', function(e) {
                if (e.button == 2 && e.target == x) {
                    menu3.showAsContextMenuAt({ x: e.pageX, y: e.pageY }, [9, 1]);
                }
            });
        </script>
    </div>

    <div class="code-block" data-source-id="context-menu">
        <div class="code-block-header">
            <div class="label">
                <i class="icon icon-interactive-window"></i>
                <div class="name">Source code</div>
            </div>
        </div>
    </div>
</div>
