<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Internal Testing Page</title>
    <script src="/static/lib/jquery/jquery-4.0.0.min.js" defer></script>
    <script src="/static/lib/jintellv3/intell.min.js"></script>
    <script src="/static/js/docs.js" defer></script>
    <script>currentPage = 'intell.ctrl.getBoundingClientRectOffset'</script>
    <style>
        body{font-family:'Segoe UI'}
        .testcase{}
        .testcase-body{border:1px solid}

        .box{position:absolute;width:100px;height:100px;background:repeating-linear-gradient(45deg, #000 0px, #000 5px, #ffd400 5px, #ffd400 10px)}
        .box-overlay{position:absolute;background:red}
    </style>
</head>
<body>
    <div class="testcase">
        <div class="title">
            Expects <mark>intell.ctrl.getBoundingClientRectOffset</mark>:
        </div>
        <ul class="expects">
            <li>Display the red overlay on top of yellow tile.</li>
        </ul>
        <button id="buttonTest">Test</button>
    </div>

    <div class="testcase-body" style="position:relative;height:400px;overflow:auto">
        <div class="box"></div>
    </div>
</body>
</html>
